<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="stage1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="stage2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="stage3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="stage4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="720" y="60" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="700" letter-spacing="0.5">STDN Agentic Pipeline</text>
  <text x="720" y="90" text-anchor="middle" fill="#94a3b8" font-size="15">Multi-agent construction of Shallow Technology Dependency Networks</text>

  <!-- ============ STAGE 1: Component Extraction ============ -->
  <rect x="60" y="140" width="300" height="380" rx="16" fill="url(#stage1)" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="210" y="175" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="600" letter-spacing="1.5">STAGE 1</text>
  <text x="210" y="200" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Component Extraction</text>

  <!-- Agent icons (3 circles) -->
  <circle cx="160" cy="255" r="22" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="260" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">Agent 1</text>
  <circle cx="210" cy="255" r="22" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="210" y="260" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">Agent 2</text>
  <circle cx="260" cy="255" r="22" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="260" y="260" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">Agent 3</text>

  <!-- Debate arrow loop -->
  <path d="M 140 290 Q 130 330 160 340 Q 260 360 280 330 Q 290 310 270 290" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowIndigo)"/>
  <text x="210" y="335" text-anchor="middle" fill="#a5b4fc" font-size="11">Iterative Debate</text>

  <!-- Convergence -->
  <rect x="130" y="370" width="160" height="36" rx="8" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="210" y="384" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">JACCARD CONVERGENCE</text>
  <text x="210" y="399" text-anchor="middle" fill="#c7d2fe" font-size="11">threshold: 0.8</text>

  <!-- Confidence -->
  <rect x="130" y="420" width="160" height="30" rx="8" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1" stroke-opacity="0.2"/>
  <text x="210" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">Confidence: 0.70 - 0.95</text>

  <!-- Output label -->
  <rect x="140" y="470" width="140" height="28" rx="6" fill="#6366f1" fill-opacity="0.2"/>
  <text x="210" y="489" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Components</text>

  <!-- ============ STAGE 2: Materials Mapping ============ -->
  <rect x="400" y="140" width="300" height="380" rx="16" fill="url(#stage2)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="550" y="175" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" letter-spacing="1.5">STAGE 2</text>
  <text x="550" y="200" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Materials Mapping</text>

  <!-- Agent icons -->
  <circle cx="500" cy="255" r="22" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="260" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">Agent 1</text>
  <circle cx="550" cy="255" r="22" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="550" y="260" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">Agent 2</text>
  <circle cx="600" cy="255" r="22" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="260" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">Agent 3</text>

  <!-- Debate arrow loop -->
  <path d="M 480 290 Q 470 330 500 340 Q 600 360 620 330 Q 630 310 610 290" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="550" y="335" text-anchor="middle" fill="#86efac" font-size="11">Iterative Debate</text>

  <!-- Convergence -->
  <rect x="470" y="370" width="160" height="36" rx="8" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="550" y="384" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">JACCARD CONVERGENCE</text>
  <text x="550" y="399" text-anchor="middle" fill="#bbf7d0" font-size="11">threshold: 0.8</text>

  <!-- Sub-stages -->
  <rect x="470" y="420" width="160" height="30" rx="8" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1" stroke-opacity="0.2"/>
  <text x="550" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">+ Process Consumables</text>

  <!-- Output label -->
  <rect x="480" y="470" width="140" height="28" rx="6" fill="#22c55e" fill-opacity="0.2"/>
  <text x="550" y="489" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="600">Materials + HS Codes</text>

  <!-- ============ STAGE 3: Country Data ============ -->
  <rect x="740" y="140" width="300" height="380" rx="16" fill="url(#stage3)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="890" y="175" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600" letter-spacing="1.5">STAGE 3</text>
  <text x="890" y="200" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Country Production Data</text>

  <!-- Data source tiers -->
  <rect x="775" y="230" width="230" height="40" rx="8" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="795" y="246" fill="#fcd34d" font-size="10" font-weight="700">TIER 1</text>
  <text x="845" y="246" fill="#fef3c7" font-size="12">USGS Mineral Commodity</text>
  <text x="795" y="262" fill="#94a3b8" font-size="10">Confidence: 0.95</text>

  <rect x="775" y="282" width="230" height="40" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="795" y="298" fill="#fbbf24" font-size="10" font-weight="700">TIER 2</text>
  <text x="845" y="298" fill="#fef3c7" font-size="12">LLM Fallback Cache</text>
  <text x="795" y="314" fill="#94a3b8" font-size="10">Confidence: 0.80 - 0.85</text>

  <rect x="775" y="334" width="230" height="40" rx="8" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
  <text x="795" y="350" fill="#f59e0b" font-size="10" font-weight="700">TIER 3</text>
  <text x="845" y="350" fill="#fef3c7" font-size="12">Fresh LLM Borda Voting</text>
  <text x="795" y="366" fill="#94a3b8" font-size="10">Confidence: 0.75 - 0.80</text>

  <!-- Provenance tag -->
  <rect x="790" y="395" width="200" height="28" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
  <text x="890" y="414" text-anchor="middle" fill="#fcd34d" font-size="11">Provenance: USGS | LLM</text>

  <!-- Output label -->
  <rect x="820" y="470" width="140" height="28" rx="6" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="890" y="489" text-anchor="middle" fill="#fef3c7" font-size="12" font-weight="600">Countries + Shares</text>

  <!-- ============ STAGE 4: Post-Processing ============ -->
  <rect x="1080" y="140" width="300" height="380" rx="16" fill="url(#stage4)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="1230" y="175" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600" letter-spacing="1.5">STAGE 4</text>
  <text x="1230" y="200" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Normalization + Export</text>

  <!-- Normalization steps -->
  <rect x="1115" y="240" width="230" height="34" rx="8" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1230" y="262" text-anchor="middle" fill="#fca5a5" font-size="12">Semantic Name Normalization</text>

  <rect x="1115" y="286" width="230" height="34" rx="8" fill="#ef4444" fill-opacity="0.10" stroke="#ef4444" stroke-width="1" stroke-opacity="0.25"/>
  <text x="1230" y="308" text-anchor="middle" fill="#fca5a5" font-size="12">Canonical Vocabulary Lookup</text>

  <rect x="1115" y="332" width="230" height="34" rx="8" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2"/>
  <text x="1230" y="354" text-anchor="middle" fill="#fca5a5" font-size="12">Cross-technology Dedup</text>

  <rect x="1115" y="378" width="230" height="34" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="1" stroke-opacity="0.15"/>
  <text x="1230" y="400" text-anchor="middle" fill="#fca5a5" font-size="12">CSV + JSON Export</text>

  <!-- Output label -->
  <rect x="1160" y="470" width="140" height="28" rx="6" fill="#ef4444" fill-opacity="0.2"/>
  <text x="1230" y="489" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">STDN Dataset</text>

  <!-- ============ FLOW ARROWS between stages ============ -->
  <line x1="360" y1="330" x2="400" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="700" y1="330" x2="740" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="1040" y1="330" x2="1080" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ============ BOTTOM: Output Summary ============ -->
  <rect x="60" y="560" width="1320" height="140" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- 4-layer DAG visualization -->
  <text x="720" y="595" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Output: 4-Layer Shallow Technology Dependency Network</text>

  <!-- DAG nodes -->
  <!-- Technology -->
  <circle cx="240" cy="645" r="20" fill="#6366f1" fill-opacity="0.4" stroke="#6366f1" stroke-width="2" filter="url(#glow)"/>
  <text x="240" y="650" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">TECH</text>
  <text x="240" y="680" text-anchor="middle" fill="#94a3b8" font-size="10">180 technologies</text>

  <!-- Arrow -->
  <line x1="270" y1="645" x2="410" y2="645" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Component -->
  <circle cx="440" cy="645" r="20" fill="#22c55e" fill-opacity="0.4" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <text x="440" y="650" text-anchor="middle" fill="#bbf7d0" font-size="10" font-weight="600">COMP</text>
  <text x="440" y="680" text-anchor="middle" fill="#94a3b8" font-size="10">~5,000 components</text>

  <!-- Arrow -->
  <line x1="470" y1="645" x2="610" y2="645" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Material -->
  <circle cx="640" cy="645" r="20" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="640" y="650" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="600">MAT</text>
  <text x="640" y="680" text-anchor="middle" fill="#94a3b8" font-size="10">~900 materials</text>

  <!-- Arrow -->
  <line x1="670" y1="645" x2="810" y2="645" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Country -->
  <circle cx="840" cy="645" r="20" fill="#ef4444" fill-opacity="0.4" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
  <text x="840" y="650" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">CTRY</text>
  <text x="840" y="680" text-anchor="middle" fill="#94a3b8" font-size="10">~140 countries</text>

  <!-- Arrow to STDN Explorer -->
  <line x1="870" y1="645" x2="1010" y2="645" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- STDN Explorer box -->
  <rect x="1020" y="622" width="180" height="46" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1110" y="641" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">STDN EXPLORER</text>
  <text x="1110" y="658" text-anchor="middle" fill="#94a3b8" font-size="10">Interactive Dashboard</text>

  <!-- ============ BOTTOM STATS BAR ============ -->
  <rect x="60" y="730" width="1320" height="60" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="190" y="758" text-anchor="middle" fill="#6366f1" font-size="24" font-weight="700">~30 min</text>
  <text x="190" y="778" text-anchor="middle" fill="#94a3b8" font-size="11">per technology</text>

  <line x1="360" y1="740" x2="360" y2="780" stroke="#334155" stroke-width="1"/>

  <text x="500" y="758" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="700">3 agents</text>
  <text x="500" y="778" text-anchor="middle" fill="#94a3b8" font-size="11">debate per stage</text>

  <line x1="640" y1="740" x2="640" y2="780" stroke="#334155" stroke-width="1"/>

  <text x="780" y="758" text-anchor="middle" fill="#f59e0b" font-size="24" font-weight="700">0.95</text>
  <text x="780" y="778" text-anchor="middle" fill="#94a3b8" font-size="11">USGS confidence</text>

  <line x1="900" y1="740" x2="900" y2="780" stroke="#334155" stroke-width="1"/>

  <text x="1040" y="758" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="700">43,000+</text>
  <text x="1040" y="778" text-anchor="middle" fill="#94a3b8" font-size="11">supply chain links</text>

  <line x1="1180" y1="740" x2="1180" y2="780" stroke="#334155" stroke-width="1"/>

  <text x="1290" y="758" text-anchor="middle" fill="#c084fc" font-size="24" font-weight="700">1 day</text>
  <text x="1290" y="778" text-anchor="middle" fill="#94a3b8" font-size="11">180 technologies</text>

  <!-- ============ FOOTER ============ -->
  <text x="720" y="840" text-anchor="middle" fill="#475569" font-size="11">Data: USGS Mineral Commodity Summaries (2022-2025) + Multi-Agent LLM Consensus</text>
  <text x="720" y="860" text-anchor="middle" fill="#475569" font-size="11">Vullikanti et al. (2026) "From Technologies to Vulnerabilities" SIGIR 2026</text>
</svg>
